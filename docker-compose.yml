version: '3.8'

services:
    app:
        build:
            context: .
            target: ${TARGET:-builder}
        ports:
            - '3000:3000'
        volumes:
            - .:/app
            - /app/node_modules
            - /app/.next
        environment:
            - NODE_ENV=${NODE_ENV:-development}
        command: ${COMMAND:-yarn dev}
        env_file:
            - .env
